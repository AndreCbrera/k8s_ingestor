apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: k8s-ingestor
  namespace: flux-system
spec:
  interval: 1m
  url: https://example.github.io/k8s-ingestor
  secretRef:
    name: k8s-ingestor-repo-credentials
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-ingestor
  namespace: logging
spec:
  interval: 5m
  chart:
    spec:
      chart: k8s-ingestor
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: k8s-ingestor
      interval: 1m
  values:
    replicaCount: 2
    cluster:
      name: prod-cluster
    clickhouse:
      addr: "clickhouse.clickhouse.svc.cluster.local:9000"
      database: "default"
      username: "admin"
      existingSecret: "clickhouse-credentials"
    ingestor:
      batchSize: 200
      flushInterval: 1
      workers: 4
      queueSize: 50000
      rateLimitPerSec: 1000
      rateLimitBurst: 2000
      logMasking: true
    service:
      type: ClusterIP
      port: 8080
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    serviceMonitor:
      enabled: true
    tracing:
      enabled: true
      endpoint: "otel-collector.observability.svc.cluster.local:4317"
