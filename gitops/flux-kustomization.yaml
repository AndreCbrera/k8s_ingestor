apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: k8s-ingestor
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/example/k8s-ingestor
  ref:
    branch: main
  secretRef:
    name: k8s-ingestor-git-credentials
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8s-ingestor
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/overlays/production
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: k8s-ingestor
  targetNamespace: logging
