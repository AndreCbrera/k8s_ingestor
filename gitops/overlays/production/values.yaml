replicaCount: 3

cluster:
  name: prod-cluster

ingestor:
  batchSize: 500
  flushInterval: 1
  workers: 8
  queueSize: 100000
  rateLimitPerSec: 5000
  rateLimitBurst: 10000

resources:
  limits:
    cpu: 2000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 256Mi

hpa:
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
