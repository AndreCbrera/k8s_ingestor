<!DOCTYPE html>
<html>
<head>
    <title>K8s Logs Dashboard</title>
    <style>
        body { font-family: monospace; background: #1a1a2e; color: #00ff00; padding: 20px; }
        h1 { color: #00d4ff; }
        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat { background: #16213e; padding: 15px; border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .logs { background: #0f0f1a; padding: 10px; border-radius: 8px; max-height: 400px; overflow-y: auto; }
        .log { padding: 5px; border-bottom: 1px solid #333; }
        .error { color: #ff6b6b; }
        .info { color: #4ecdc4; }
        .debug { color: #95a5a6; }
        #status { padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .connected { background: #27ae60; }
        .disconnected { background: #c0392b; }
    </style>
</head>
<body>
    <h1>K8s Log Ingestor Dashboard</h1>
    <div id="status" class="disconnected">Connecting...</div>
    
    <div class="stats">
        <div class="stat">
            <div>Total Logs</div>
            <div class="stat-value" id="total">-</div>
        </div>
        <div class="stat">
            <div>Demo Logs</div>
            <div class="stat-value" id="demo">-</div>
        </div>
        <div class="stat">
            <div>Errors</div>
            <div class="stat-value" id="errors">-</div>
        </div>
        <div class="stat">
            <div>Last Update</div>
            <div class="stat-value" id="time">-</div>
        </div>
    </div>
    
    <h2>Live Logs</h2>
    <div class="logs" id="logs">Loading...</div>
    
    <script>
        async function update() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('status').className = 'connected';
                    document.getElementById('status').textContent = 'Connected';
                    
                    const logs = data.data.logs || [];
                    const total = data.data.total || 0;
                    
                    document.getElementById('total').textContent = total.toLocaleString();
                    document.getElementById('demo').textContent = logs.filter(l => l.namespace === 'demo').length;
                    document.getElementById('errors').textContent = logs.filter(l => l.level === 'error').length;
                    document.getElementById('time').textContent = new Date().toLocaleTimeString();
                    
                    const logsDiv = document.getElementById('logs');
                    logsDiv.innerHTML = logs.map(log => 
                        `<div class="log ${log.level}">${log.timestamp} [${log.namespace}] ${log.message}</div>`
                    ).join('');
                }
            } catch(e) {
                document.getElementById('status').className = 'disconnected';
                document.getElementById('status').textContent = 'Error: ' + e.message;
            }
        }
        
        update();
        setInterval(update, 3000);
    </script>
</body>
</html>
