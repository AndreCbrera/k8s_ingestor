<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onum | Data Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090e;
            --bg-secondary: #111118;
            --bg-tertiary: #18181f;
            --border: rgba(255,255,255,0.06);
            --text-primary: #f8fafc;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --purple: #a78bfa;
            --blue: #60a5fa;
            --cyan: #22d3ee;
            --pink: #f472b6;
            --orange: #fb923c;
            --green: #4ade80;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 32px; }

        /* Section Header */
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px;
        }
        .section-title { font-size: 18px; font-weight: 600; }
        .section-tabs { display: flex; gap: 8px; }
        .tab {
            padding: 8px 16px; border-radius: 8px;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .tab:hover { color: var(--text-secondary); border-color: rgba(255,255,255,0.1); }
        .tab.active { background: rgba(167,139,250,0.15); border-color: var(--purple); color: var(--purple); }

        /* Sankey Card */
        .sankey-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 32px;
            position: relative; overflow: hidden;
        }
        .sankey-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(167,139,250,0.5), transparent);
        }

        /* Column Headers */
        .column-headers {
            display: flex; justify-content: space-between;
            padding: 0 80px; margin-bottom: 20px;
        }
        .col-header {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .col-header svg { width: 16px; height: 16px; opacity: 0.5; }

        /* Main Visualization */
        .sankey-container {
            position: relative; height: 480px;
            background: radial-gradient(ellipse at center, rgba(167,139,250,0.03) 0%, transparent 70%);
            border-radius: 16px;
        }

        .sankey-svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 20px rgba(167,139,250,0.1));
        }

        /* Flow paths */
        .flow-path {
            fill: none;
            stroke-linecap: round;
            transition: opacity 0.3s;
        }
        .sankey-container:hover .flow-path { opacity: 0.7; }
        .sankey-container:hover .flow-path:hover { opacity: 1; }

        /* Animated gradient flow */
        .flow-animated {
            stroke-dasharray: 8 12;
            animation: flowDash 1s linear infinite;
        }
        @keyframes flowDash { to { stroke-dashoffset: -20; } }

        /* Nodes */
        .node-group { cursor: pointer; }
        .node-group:hover rect { filter: brightness(1.2); }
        .node-group:hover text { filter: brightness(1.1); }
        .node-rect {
            transition: all 0.3s ease;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }
        .node-group:hover .node-rect {
            filter: brightness(1.3) drop-shadow(0 8px 20px rgba(0,0,0,0.4));
            transform: scale(1.02);
        }

        /* Particles */
        .particle-container {
            position: absolute; inset: 0;
            pointer-events: none; overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 50%;
            filter: blur(1px);
            pointer-events: none;
        }

        /* Data labels on hover */
        .data-tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .data-tooltip.visible { opacity: 1; }
        .tooltip-title { font-weight: 600; margin-bottom: 4px; }
        .tooltip-value { color: var(--cyan); font-size: 14px; font-weight: 700; }

        /* Stats below */
        .sankey-stats {
            display: flex; justify-content: center; gap: 40px;
            margin-top: 24px; padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        .stat { text-align: center; }
        .stat-value { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Data Flow Visualization</h2>
            <div class="section-tabs">
                <div class="tab active">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    Listeners
                </div>
                <div class="tab">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
                    Clusters
                </div>
                <div class="tab">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg>
                    Labels
                </div>
                <div class="tab">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Pipelines
                </div>
                <div class="tab">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                    Data sinks
                </div>
            </div>
        </div>

        <div class="sankey-card">
            <div class="column-headers">
                <div class="col-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg> Listeners</div>
                <div class="col-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg> Clusters</div>
                <div class="col-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg> Labels</div>
                <div class="col-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> Pipelines</div>
                <div class="col-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg> Data sinks</div>
            </div>

            <div class="sankey-container" id="sankey-container">
                <svg class="sankey-svg" id="sankey-svg"></svg>
                <div class="particle-container" id="particles"></div>
                <div class="data-tooltip" id="tooltip">
                    <div class="tooltip-title" id="tooltip-title">Node</div>
                    <div class="tooltip-value" id="tooltip-value">0 GB</div>
                </div>
            </div>

            <div class="sankey-stats">
                <div class="stat">
                    <div class="stat-value" id="total-in" style="color: var(--blue)">1.02TB</div>
                    <div class="stat-label">Total In</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-out" style="color: var(--green)">248GB</div>
                    <div class="stat-label">Total Out</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="savings" style="color: var(--purple)">75.5%</div>
                    <div class="stat-label">Reduction</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="events-sec" style="color: var(--cyan)">80K</div>
                    <div class="stat-label">Events/sec</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const fmt = n => n >= 1e9 ? (n/1e9).toFixed(2)+'TB' : n >= 1e6 ? (n/1e6).toFixed(1)+'GB' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n+'';

        const colors = [
            { main: '#60a5fa', light: 'rgba(96,165,250,0.6)', glow: 'rgba(96,165,250,0.3)' },
            { main: '#a78bfa', light: 'rgba(167,139,250,0.6)', glow: 'rgba(167,139,250,0.3)' },
            { main: '#f472b6', light: 'rgba(244,114,182,0.6)', glow: 'rgba(244,114,182,0.3)' },
            { main: '#fb923c', light: 'rgba(251,146,60,0.6)', glow: 'rgba(251,146,60,0.3)' },
            { main: '#22d3ee', light: 'rgba(34,211,238,0.6)', glow: 'rgba(34,211,238,0.3)' },
            { main: '#4ade80', light: 'rgba(74,222,128,0.6)', glow: 'rgba(74,222,128,0.3)' }
        ];

        // Data sources
        const sources = [
            { name: 'demo', volume: 8500, label: 'api-service' },
            { name: 'default', volume: 5200, label: 'test-pod' },
            { name: 'logging', volume: 2100, label: 'fluent-bit' },
            { name: 'kube-system', volume: 800, label: 'coredns' },
            { name: 'clickhouse-op', volume: 600, label: 'operator' }
        ];

        // Pipeline stages
        const stages = ['Listeners', 'Clusters', 'Labels', 'Pipelines', 'Sinks'];

        function createGradient(svg, id, color1, color2) {
            const defs = svg.querySelector('defs') || document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            if (!svg.querySelector('defs')) svg.appendChild(defs);
            
            const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
            gradient.setAttribute('id', id);
            gradient.setAttribute('x1', '0%');
            gradient.setAttribute('x2', '100%');
            gradient.innerHTML = `
                <stop offset="0%" stop-color="${color1}" stop-opacity="0.7"/>
                <stop offset="100%" stop-color="${color2}" stop-opacity="0.7"/>
            `;
            defs.appendChild(gradient);
        }

        function drawSankey(nsCounts) {
            const svg = $('sankey-svg');
            const container = $('sankey-container');
            const rect = container.getBoundingClientRect();
            const w = rect.width || 1100;
            const h = 480;
            
            svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
            
            const total = Object.values(nsCounts).reduce((a,b) => a+b, 0) || 1;
            const entries = Object.entries(nsCounts).sort((a,b) => b[1] - a[1]);
            
            // Create gradients
            colors.forEach((c, i) => {
                createGradient(svg, `grad${i}`, c.main, colors[(i+1)%colors.length].main);
            });
            
            // Column positions
            const colX = [80, w*0.27, w*0.47, w*0.67, w-100];
            
            let svgContent = `
                <defs>
                    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="4" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
                    </filter>
                </defs>
            `;
            
            let totalHeight = 0;
            entries.forEach(([ns, count]) => {
                totalHeight += Math.max(40, (count / total) * 350) + 25;
            });
            const startY = Math.max(20, (h - totalHeight + 100) / 2);
            
            let y = startY;
            let particles = [];
            
            entries.forEach(([ns, count], i) => {
                const height = Math.max(40, (count / total) * 350);
                const color = colors[i % colors.length];
                const centerY = y + height / 2;
                const gb = (count / 1000).toFixed(1);
                
                // SOURCE NODE (Listeners)
                svgContent += `
                    <g class="node-group" data-name="${ns}" data-value="${gb}GB">
                        <rect class="node-rect" x="20" y="${y}" width="120" height="${height}" rx="8" fill="${color.main}" filter="url(#shadow)"/>
                        <text x="80" y="${centerY - 8}" text-anchor="middle" fill="white" font-size="13" font-weight="600">${ns}</text>
                        <text x="80" y="${centerY + 10}" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">${gb} GB</text>
                    </g>
                `;
                
                // Flow to Clusters
                const clusterY = 70 + i * 65;
                const cp1x = w * 0.12, cp2x = w * 0.2;
                
                // Animated path
                svgContent += `
                    <path class="flow-path flow-animated" 
                        d="M140,${centerY} C${cp1x},${centerY} ${cp2x},${clusterY} ${colX[1]},${clusterY}"
                        stroke="url(#grad${i%6})" stroke-width="${height * 0.6}">
                    </path>
                    <path class="flow-path" 
                        d="M140,${centerY} C${cp1x},${centerY} ${cp2x},${clusterY} ${colX[1]},${clusterY}"
                        stroke="${color.light}" stroke-width="${height * 0.5}" opacity="0.3">
                    </path>
                `;
                
                // CLUSTER NODE
                svgContent += `
                    <g class="node-group" data-name="cluster-${ns}" data-value="${gb}GB">
                        <rect class="node-rect" x="${colX[1]-30}" y="${clusterY-22}" width="60" height="44" rx="8" fill="${color.main}" opacity="0.7" filter="url(#glow)"/>
                        <text x="${colX[1]}" y="${clusterY+2}" text-anchor="middle" fill="white" font-size="10" font-weight="500">cluster</text>
                    </g>
                `;
                
                // Flow to Labels
                const labelY = 50 + i * 60;
                svgContent += `
                    <path class="flow-path flow-animated" style="animation-delay: ${i*0.2}s"
                        d="M${colX[1]+30},${clusterY} C${w*0.34},${clusterY} ${w*0.38},${labelY} ${colX[2]},${labelY}"
                        stroke="url(#grad${(i+1)%6})" stroke-width="${height * 0.5}">
                    </path>
                `;
                
                // LABEL NODE
                const labelWidth = Math.min(90, ns.length * 10 + 30);
                svgContent += `
                    <g class="node-group" data-name="${ns}" data-value="${gb}GB">
                        <rect class="node-rect" x="${colX[2]-labelWidth/2}" y="${labelY-24}" width="${labelWidth}" height="48" rx="8" fill="${color.main}" opacity="0.6" filter="url(#glow)"/>
                        <text x="${colX[2]}" y="${labelY-4}" text-anchor="middle" fill="white" font-size="11" font-weight="600">${ns}</text>
                        <text x="${colX[2]}" y="${labelY+12}" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">${gb}GB</text>
                    </g>
                `;
                
                // Flow to Pipelines
                const pipelineY = 80 + i * 55;
                svgContent += `
                    <path class="flow-path flow-animated" style="animation-delay: ${i*0.3}s"
                        d="M${colX[2]+labelWidth/2},${labelY} C${w*0.54},${labelY} ${w*0.58},${pipelineY} ${colX[3]},${pipelineY}"
                        stroke="url(#grad${(i+2)%6})" stroke-width="${height * 0.45}">
                    </path>
                `;
                
                // PIPELINE NODE
                const pipelineNames = ['k8s-parser', 'syslog-parser', 'json-parser', 'filter', 'enrich'];
                svgContent += `
                    <g class="node-group" data-name="${pipelineNames[i]}" data-value="${gb}GB">
                        <rect class="node-rect" x="${colX[3]-35}" y="${pipelineY-20}" width="70" height="40" rx="8" fill="${color.main}" opacity="0.65" filter="url(#glow)"/>
                        <text x="${colX[3]}" y="${pipelineY+4}" text-anchor="middle" fill="white" font-size="9" font-weight="500">${pipelineNames[i]}</text>
                    </g>
                `;
                
                // Flow to Sink
                const sinkY = 60 + i * 52;
                const sinkHeight = height * 0.4;
                svgContent += `
                    <path class="flow-path flow-animated" style="animation-delay: ${i*0.4}s"
                        d="M${colX[3]+35},${pipelineY} C${w*0.74},${pipelineY} ${w*0.82},${sinkY} ${colX[4]-50},${sinkY}"
                        stroke="url(#grad${(i+3)%6})" stroke-width="${sinkHeight}">
                    </path>
                `;
                
                // Add particle paths for animation
                particles.push({
                    path: `M140,${centerY} C${cp1x},${centerY} ${cp2x},${clusterY} ${colX[1]},${clusterY} C${w*0.34},${clusterY} ${w*0.38},${labelY} ${colX[2]},${labelY} C${w*0.54},${labelY} ${w*0.58},${pipelineY} ${colX[3]},${pipelineY} C${w*0.74},${pipelineY} ${w*0.82},${sinkY} ${colX[4]-50},${sinkY}`,
                    color: color.main,
                    delay: i * 0.8
                });
                
                y += height + 25;
            });
            
            // CLICKHOUSE SINK
            const sinkTotalHeight = Math.min(y - startY + 40, 400);
            svgContent += `
                <g class="node-group" data-name="ClickHouse" data-value="${fmt(total)}">
                    <rect class="node-rect" x="${colX[4]-60}" y="60" width="120" height="${sinkTotalHeight}" rx="12" 
                        fill="url(#grad2)" filter="url(#shadow)"/>
                    <rect x="${colX[4]-60}" y="60" width="120" height="${sinkTotalHeight}" rx="12" 
                        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                    <text x="${colX[4]}" y="${60 + sinkTotalHeight/2 - 20}" text-anchor="middle" fill="white" font-size="16" font-weight="700">ClickHouse</text>
                    <text x="${colX[4]}" y="${60 + sinkTotalHeight/2}" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-weight="600">${fmt(total)}</text>
                    <text x="${colX[4]}" y="${60 + sinkTotalHeight/2 + 20}" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">total events</text>
                </g>
            `;
            
            svg.innerHTML = svgContent;
            
            // Create animated particles
            createParticles(particles, w);
            
            // Add hover interactions
            document.querySelectorAll('.node-group').forEach(node => {
                node.addEventListener('mouseenter', (e) => {
                    const name = node.dataset.name;
                    const value = node.dataset.value;
                    const tooltip = $('tooltip');
                    tooltip.querySelector('#tooltip-title').textContent = name;
                    tooltip.querySelector('#tooltip-value').textContent = value;
                    tooltip.classList.add('visible');
                });
                node.addEventListener('mousemove', (e) => {
                    const tooltip = $('tooltip');
                    const rect = container.getBoundingClientRect();
                    tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                    tooltip.style.top = (e.clientY - rect.top - 50) + 'px';
                });
                node.addEventListener('mouseleave', () => {
                    $('tooltip').classList.remove('visible');
                });
            });
        }

        function createParticles(particleConfigs, width) {
            const container = $('particles');
            container.innerHTML = '';
            
            particleConfigs.forEach((config, idx) => {
                for (let i = 0; i < 3; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.background = config.color;
                    particle.style.boxShadow = `0 0 10px ${config.color}, 0 0 20px ${config.color}`;
                    particle.style.animation = `flowParticle${idx} ${4 + i}s ease-in-out infinite`;
                    particle.style.animationDelay = `${config.delay + i * 1.5}s`;
                    container.appendChild(particle);
                }
                
                // Create dynamic keyframes
                const style = document.createElement('style');
                style.textContent = `
                    @keyframes flowParticle${idx} {
                        0% { left: 5%; top: ${10 + idx * 15}%; opacity: 0; transform: scale(0.5); }
                        10% { opacity: 1; transform: scale(1); }
                        50% { top: ${15 + idx * 12}%; }
                        90% { opacity: 1; }
                        100% { left: 90%; top: ${20 + idx * 10}%; opacity: 0; transform: scale(0.5); }
                    }
                `;
                document.head.appendChild(style);
            });
        }

        function fetchData() {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/logs');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (data.success && data.data) {
                            const logs = data.data.logs || [];
                            const total = data.data.total || 0;
                            
                            const nsCounts = {};
                            logs.forEach(log => nsCounts[log.namespace] = (nsCounts[log.namespace] || 0) + 1);
                            
                            // Ensure we have some data
                            if (Object.keys(nsCounts).length === 0) {
                                nsCounts['demo'] = 150;
                                nsCounts['default'] = 100;
                                nsCounts['logging'] = 50;
                                nsCounts['kube-system'] = 20;
                            }
                            
                            $('total-in').textContent = fmt(total);
                            $('total-out').textContent = fmt(total * 0.25);
                            $('events-sec').textContent = Math.round(total / 1000) + 'K';
                            
                            drawSankey(nsCounts);
                        }
                    } catch (e) { console.error(e); }
                }
            };
            xhr.send();
        }

        // Initial draw with sample data
        const sampleData = { demo: 1500, default: 800, logging: 400, 'kube-system': 150, 'clickhouse-operator': 80 };
        drawSankey(sampleData);
        
        fetchData();
        setInterval(fetchData, 5000);
        window.addEventListener('resize', fetchData);
    </script>
</body>
</html>
